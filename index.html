<!-- SOLO CAMBIOS EN TAROT + HORÓSCOPO -->

<script>

/* =========================
   🌙 HORÓSCOPO NUEVO (MEJORADO)
========================= */

const signos = [
"Aries","Tauro","Géminis","Cáncer","Leo","Virgo",
"Libra","Escorpio","Sagitario","Capricornio","Acuario","Piscis"
];

const energias = [
"Un cambio importante se acerca a tu vida.",
"Hoy tu intuición será más fuerte que la razón.",
"Se desbloquea una situación emocional.",
"Evita decisiones impulsivas.",
"Alguien piensa en ti más de lo que crees.",
"Momento de crecimiento personal.",
"Una conversación será clave.",
"Cierra ciclos sin miedo.",
"Nueva oportunidad emocional aparece.",
"Tu energía está atrayendo cambios.",
"Confía en lo que sientes.",
"Algo oculto se revela pronto."
];

function generarHoroscopo(){
const hoy = new Date();
const seed = hoy.getDate() + hoy.getMonth()*10;

const grid = document.getElementById("horo-grid");
if(!grid) return;

grid.innerHTML = signos.map((s,i)=>{
const idx = (seed + i*3) % energias.length;

return `
<div>
<b>${s}</b><br>
${energias[idx]}
</div>
`;
}).join("");
}


/* =========================
   🃏 TAROT NUEVO (MEJORADO)
========================= */

const tarotMejorado = [
{
nombre:"El Loco",
mensaje:"Estás iniciando un camino sin mapa, confía."
},
{
nombre:"El Mago",
mensaje:"Tienes más poder del que estás usando."
},
{
nombre:"La Sacerdotisa",
mensaje:"Tu intuición está despertando."
},
{
nombre:"La Emperatriz",
mensaje:"Crecimiento emocional y abundancia."
},
{
nombre:"El Emperador",
mensaje:"Necesitas estructura y control."
},
{
nombre:"La Rueda",
mensaje:"El destino está girando a tu favor."
},
{
nombre:"La Luna",
mensaje:"No todo es lo que parece."
},
{
nombre:"El Sol",
mensaje:"Claridad y éxito en camino."
}
];

let seleccionadas = [];

function iniciarTirada(){

const mesa = document.getElementById("mesaTarot");
const lectura = document.getElementById("lecturaTarot");

if(!mesa || !lectura) return;

seleccionadas = [];

mesa.innerHTML = tarotMejorado.map((c,i)=>`
<div class="carta" onclick="seleccionarCarta(${i})">
🜁
</div>
`).join("");

lectura.innerHTML = "<p style='color:gold'>Elige 3 cartas...</p>";
}

function seleccionarCarta(i){

if(seleccionadas.length >= 3) return;
if(seleccionadas.includes(i)) return;

seleccionadas.push(i);

const cartas = document.querySelectorAll(".carta");
if(cartas[i]){
cartas[i].classList.add("selected");
}

if(seleccionadas.length === 3) mostrarLectura();
}

function mostrarLectura(){

const lectura = document.getElementById("lecturaTarot");
if(!lectura) return;

const [a,b,c] = seleccionadas.map(i=>tarotMejorado[i]);

lectura.innerHTML = `
<h3 style="color:gold">🔮 Lectura del destino</h3>

<p>🜂 Pasado: ${a.nombre} — ${a.mensaje}</p>
<p>🌙 Presente: ${b.nombre} — ${b.mensaje}</p>
<p>🔮 Futuro: ${c.nombre} — ${c.mensaje}</p>

<div style="margin-top:15px;color:gold">
💖 Esta energía no es casual. Escúchala.
</div>
`;
}


/* =========================
   🚀 INICIALIZACIÓN
========================= */

window.addEventListener("DOMContentLoaded", () => {
generarHoroscopo();
});

</script>
