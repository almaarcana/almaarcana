<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma Arcana 🔮</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#120018,#000);
color:#f5e6c8;
text-align:center;
}

.top-btn{
position:fixed;
top:15px;
right:15px;
background:gold;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
z-index:999;
}

h1{
color:gold;
text-shadow:0 0 20px gold;
margin-top:60px;
}

section{
padding:25px 10px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(0,0,0,.7);
border:1px solid gold;
border-radius:12px;
padding:20px;
margin:20px auto;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

/* TAROT */
#tarot{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.tarot-card{
width:95px;
height:150px;
border-radius:10px;
background:#1a1a1a;
border:1px solid gold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:gold;
}

.tarot-card.selected{
background:gold;
color:black;
}

/* SERVICIOS */
.service{
border:1px solid gold;
padding:15px;
margin:12px auto;
border-radius:10px;
background:rgba(0,0,0,.5);
max-width:600px;
}

.service button{
width:100%;
background:gold;
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
}

/* HOROSCOPO (VERSIÓN ORIGINAL NO COMPACTA) */
#horo div{
margin:8px 0;
padding:8px;
border:1px solid gold;
border-radius:8px;
background:rgba(0,0,0,.3);
}

</style>
</head>

<body>

<a href="#servicios" class="top-btn">💳 Servicios</a>

<h1>🔮 Alma Arcana</h1>

<!-- TAROT -->
<section class="card">
<div id="tarot"></div>
</section>

<!-- HOROSCOPO -->
<section class="card">
<h2>🌙 Horóscopo diario</h2>
<div id="horo"></div>
</section>

<!-- SERVICIOS COMPLETOS (INTACTOS) -->
<section id="servicios" class="card">

<div class="service">Carta astral 5€</div>
<div class="service">Péndulo 5€</div>
<div class="service">Tirada amor 10€</div>
<div class="service">Tirada dinero 10€</div>
<div class="service">Tirada simple 5€</div>
<div class="service">Tirada profunda 20€</div>
<div class="service">Tirada trabajo 10€</div>
<div class="service">Apertura caminos 25€</div>
<div class="service">Ritual amor 20€</div>
<div class="service">Limpieza energética 10€</div>

</section>

<script>

/* HOROSCOPO ORIGINAL ESTABLE */
const signos=[
"Aries","Tauro","Géminis","Cáncer",
"Leo","Virgo","Libra","Escorpio",
"Sagitario","Capricornio","Acuario","Piscis"
];

const mensajes=[
"energía de cambio",
"equilibrio",
"decisión",
"crecimiento",
"bloqueo"
];

const hoy=new Date();
const seed=hoy.getFullYear()*1000 + hoy.getMonth()*100 + hoy.getDate();

function rand(n){
let x=Math.sin(n)*10000;
return x-Math.floor(x);
}

document.getElementById("horo").innerHTML=
signos.map((s,i)=>{
let m=mensajes[Math.floor(rand(seed+i)*mensajes.length)];
return `<div><b style="color:gold;">${s}</b>: ${m}</div>`;
}).join("");

</script>

</body>
</html>
