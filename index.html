<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma Arcana 🔮</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#120018,#000);
color:#f5e6c8;
text-align:center;
}

.top-btn{
position:fixed;
top:15px;
right:15px;
background:gold;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
z-index:999;
box-shadow:0 0 10px rgba(255,215,0,.5);
}

h1{
color:gold;
text-shadow:0 0 20px gold;
margin-top:60px;
}

section{
padding:25px 10px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(0,0,0,.7);
border:1px solid gold;
border-radius:12px;
padding:20px;
margin:20px auto;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

/* SERVICIOS NO TOCADOS */
.service:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(255,215,0,.3);
}

.service{
border:1px solid gold;
padding:15px;
margin:12px auto;
border-radius:10px;
background:rgba(0,0,0,.5);
max-width:600px;
}

.service button{
width:100%;
background:gold;
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* HORÓSCOPO */
#horo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:6px;
max-width:700px;
margin:15px auto;
font-size:11px;
}

#horo-grid div{
padding:6px;
border:1px solid gold;
border-radius:6px;
background:rgba(0,0,0,.35);
line-height:1.2;
}

#horo-grid b{
color:gold;
font-size:12px;
}

/* 🔮 TAROT SOLO MEJORADO */
#mesaTarot{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.carta{
width:75px;
height:115px;
border-radius:10px;
border:1px solid gold;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.4s;
background:linear-gradient(145deg,#111,#000);
color:gold;
font-size:10px;
}

.carta:hover{
transform:translateY(-6px);
box-shadow:0 0 15px gold;
}

.carta.selected{
background:gold;
color:black;
transform:scale(1.1);
}
</style>
</head>

<body>

<a href="#servicios" class="top-btn">💳 Servicios</a>

<h1>🔮 Alma Arcana</h1>
<p>Tarot · Energía · Destino</p>

<section class="card">
<h2>🌙 Horóscopo diario</h2>
<div id="horo-grid"></div>
</section>

<!-- 🔮 TAROT MEJORADO SOLO AQUÍ -->
<section class="card">
<h2>🔮 Tarot interactivo energético</h2>

<button onclick="iniciarTirada()" style="background:gold;border:none;padding:12px 18px;font-weight:bold;border-radius:8px;cursor:pointer;">
🌀 Conectar con el destino
</button>

<p style="margin-top:10px;">
Elige 3 cartas. La energía no es aleatoria.
</p>

<div id="mesaTarot"></div>
<div id="lecturaTarot"></div>
</section>

<script>

/* HORÓSCOPO SIN CAMBIOS */
const signos=["Aries","Tauro","Géminis","Cáncer","Leo","Virgo","Libra","Escorpio","Sagitario","Capricornio","Acuario","Piscis"];

const frases=[
"Hoy necesitas actuar con calma.",
"Se abre una oportunidad importante.",
"Tu intuición será clave.",
"Evita decisiones impulsivas.",
"Cambios positivos llegan.",
"Buena energía personal.",
"Observa antes de actuar.",
"Cierre de ciclo necesario.",
"Energía de transformación.",
"Momento de decisión.",
"Claridad mental aparece.",
"Algo oculto se revela."
];

const hoy=new Date();
const seedBase = hoy.getFullYear()*10000 + (hoy.getMonth()+1)*100 + hoy.getDate();

let usados=[];

document.getElementById("horo-grid").innerHTML =
signos.map((s,i)=>{
let idx;
let intentos=0;
do{
idx=Math.floor(Math.sin(seedBase+i*999+intentos)*10000 % frases.length);
if(idx<0) idx*=-1;
intentos++;
}while(usados.includes(idx) && intentos<10);
usados.push(idx);
return `<div><b>${s}</b><br>${frases[idx]}</div>`;
}).join("");


/* 🔮 TAROT NUEVO SOLO MEJORADO */
const mazoOriginal = [
{n:"El Loco",m:"Inicio inesperado de cambio energético."},
{n:"El Mago",m:"Capacidad de manifestar lo que deseas."},
{n:"La Sacerdotisa",m:"Información oculta saldrá a la luz."},
{n:"La Emperatriz",m:"Crecimiento emocional y abundancia."},
{n:"El Emperador",m:"Decisión firme y control de situación."},
{n:"Los Enamorados",m:"Decisión emocional importante."},
{n:"El Carro",m:"Avance rápido hacia el éxito."},
{n:"La Justicia",m:"Equilibrio y verdad en camino."},
{n:"El Ermitaño",m:"Reflexión profunda necesaria."},
{n:"La Rueda de la Fortuna",m:"Cambio inevitable de destino."},
{n:"La Fuerza",m:"Control emocional en prueba."},
{n:"La Muerte",m:"Transformación total."},
{n:"La Templanza",m:"Equilibrio y sanación."},
{n:"El Diablo",m:"Ataduras emocionales."},
{n:"La Torre",m:"Ruptura necesaria para avanzar."},
{n:"La Estrella",m:"Esperanza renovada."},
{n:"La Luna",m:"Confusión e intuición activa."},
{n:"El Sol",m:"Éxito y claridad."},
{n:"El Juicio",m:"Despertar espiritual."},
{n:"El Mundo",m:"Cierre de ciclo completo."
}
];

let mazo=[];
let seleccion=[];

function iniciarTirada(){
mazo=[...mazoOriginal].sort(()=>Math.random()-0.5);
seleccion=[];
render();
document.getElementById("lecturaTarot").innerHTML=
"<p style='color:gold;'>Conecta con la energía del universo...</p>";
}

function render(){
document.getElementById("mesaTarot").innerHTML=
mazo.map((c,i)=>`
<div class="carta ${seleccion.includes(i)?'selected':''}" onclick="elegir(${i})">
${seleccion.includes(i)?c.n:"🜁"}
</div>
`).join("");
}

function elegir(i){
if(seleccion.includes(i)) return;
if(seleccion.length>=3) return;
seleccion.push(i);
render();
if(seleccion.length===3) mostrar();
}

/* 🔥 MONETIZACIÓN SIN TOCAR SERVICIOS */
function recomendar(texto){

if(texto.includes("amor") || texto.includes("Enamorados"))
return "💖 Recomendado: Tirada del amor";

if(texto.includes("dinero") || texto.includes("Emperador"))
return "💰 Recomendado: Tirada del dinero";

if(texto.includes("transformación") || texto.includes("Muerte") || texto.includes("Torre"))
return "🔮 Recomendado: Tirada profunda";

return "🔮 Recomendado: Carta astral";
}

function mostrar(){
let [a,b,c]=seleccion.map(i=>mazo[i]);

let texto = a.m + b.m + c.m;

document.getElementById("lecturaTarot").innerHTML=`
<h3 style="color:gold;">🔮 Lectura energética</h3>

<p>🜂 Pasado: ${a.n} - ${a.m}</p>
<p>🌙 Presente: ${b.n} - ${b.m}</p>
<p>🔮 Futuro: ${c.n} - ${c.m}</p>

<hr>

<p style="color:gold;font-weight:bold;">
${recomendar(texto)}
</p>

<p style="color:#ccc;">
La energía mostrada sugiere un proceso en evolución.
</p>
`;
}

iniciarTirada();

</script>

</body>
</html>
