<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma Arcana 🔮</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#120018,#000);
color:#f5e6c8;
text-align:center;
}

/* BOTÓN SERVICIOS */
.top-btn{
position:fixed;
top:15px;
right:15px;
background:gold;
color:black;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
z-index:999;
box-shadow:0 0 10px rgba(255,215,0,.5);
}

.top-btn:hover{transform:scale(1.05);}

h1{
color:gold;
text-shadow:0 0 20px gold;
margin-top:60px;
}

section{
padding:25px 10px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(0,0,0,.7);
border:1px solid gold;
border-radius:12px;
padding:20px;
margin:20px auto;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

/* TAROT */
#tarot{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:15px;
}

.tarot-card{
width:95px;
height:150px;
border-radius:10px;
background:#1a1a1a;
border:1px solid gold;
cursor:pointer;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:gold;
}

.tarot-card:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,215,0,.3);
}

.tarot-card.selected{
background:gold;
color:black;
transform:scale(1.08);
}

/* BOTONES */
button{
background:gold;
border:none;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* SERVICIOS */
.service{
border:1px solid gold;
padding:15px;
margin:12px auto;
border-radius:10px;
background:rgba(0,0,0,.5);
max-width:600px;
}

.service button{
width:100%;
}

/* HOROSCOPO */
#horo div{
margin:8px 0;
padding:8px;
border:1px solid gold;
border-radius:8px;
background:rgba(0,0,0,.3);
}

/* RESPONSIVE */
@media(max-width:768px){
.tarot-card{
width:75px;
height:120px;
font-size:24px;
}
}
</style>
</head>

<body>

<!-- BOTÓN -->
<a href="#servicios" class="top-btn">💳 Servicios</a>

<h1>🔮 Alma Arcana</h1>
<p>Tarot · Energía · Destino</p>

<!-- TAROT -->
<section class="card">
<h2>🔮 Tarot del destino</h2>
<p>Elige 3 cartas del mazo</p>

<div id="tarot"></div>

<button onclick="revelar()">✨ Revelar lectura</button>

<p id="resultado"></p>
</section>

<!-- HOROSCOPO -->
<section class="card">
<h2>🌙 Horóscopo diario</h2>
<div id="horo"></div>
</section>

<!-- SERVICIOS -->
<section id="servicios" class="card">
<h2>💳 Servicios espirituales</h2>

<div class="service">
<h3>🔮 Carta astral</h3>
<p>5€</p>
<button onclick="location.href='https://buy.stripe.com/bJe9AT5YrgqaftydIS2B208'">Pagar</button>
</div>

<div class="service">
<h3>🧿 Péndulo (5 preguntas)</h3>
<p>5€</p>
<button onclick="location.href='https://buy.stripe.com/dRm4gzgD5b5Qa9e0W62B204'">Pagar</button>
</div>

<div class="service">
<h3>💖 Tirada del amor</h3>
<p>10€</p>
<button onclick="location.href='https://buy.stripe.com/bJe7sLfz15LwepudIS2B207'">Pagar</button>
</div>

<div class="service">
<h3>💰 Tirada del dinero</h3>
<p>10€</p>
<button onclick="location.href='https://buy.stripe.com/14A8wP86z0rc4OU5cm2B206'">Pagar</button>
</div>

<div class="service">
<h3>🔮 Tirada simple</h3>
<p>5€</p>
<button onclick="location.href='https://buy.stripe.com/aFafZh5Yr7TEa9e34e2B209'">Pagar</button>
</div>

<div class="service">
<h3>🔮 Tirada profunda</h3>
<p>20€</p>
<button onclick="location.href='https://buy.stripe.com/bJefZheuX2zk6X220a2B203'">Pagar</button>
</div>

</section>

<script>

/* 🃏 TAROT */
const tarot=document.getElementById("tarot");
let seleccionadas=[];

const cartas=[
{nombre:"El Mago",img:"https://upload.wikimedia.org/wikipedia/commons/0/0f/RWS_Tarot_01_Magician.jpg",msg:"Inicio de poder y creación."},
{nombre:"La Luna",img:"https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg",msg:"Intuición y confusión emocional."},
{nombre:"El Sol",img:"https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg",msg:"Éxito y claridad."},
{nombre:"La Estrella",img:"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg",msg:"Esperanza y guía."},
{nombre:"La Torre",img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg",msg:"Cambio inevitable."},
{nombre:"El Mundo",img:"https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg",msg:"Cierre positivo."}
];

cartas.forEach((c,i)=>{
let div=document.createElement("div");
div.className="tarot-card";
div.innerHTML="🃏";

div.onclick=()=>{
if(seleccionadas.includes(i)) return;
if(seleccionadas.length>=3) return;

seleccionadas.push(i);
div.classList.add("selected");
div.innerHTML="✔";
};

tarot.appendChild(div);
});

/* 🔮 LECTURA */
function revelar(){

if(seleccionadas.length<3){
document.getElementById("resultado").innerHTML="Elige 3 cartas";
return;
}

let elegidas=seleccionadas.map(i=>cartas[i]);

let html="🔮 <b>Lectura del destino</b><br><br>";

elegidas.forEach(c=>{
html+=`
<div style="margin-bottom:10px;">
<img src="${c.img}" style="width:90px;border-radius:8px;"><br>
<b>${c.nombre}</b><br>
${c.msg}
</div>
`;
});

let energia="Energía en movimiento.";

if(elegidas.some(c=>c.nombre==="La Torre")) energia="Cambio fuerte e inevitable.";
if(elegidas.some(c=>c.nombre==="El Sol")) energia="Energía positiva y expansión.";

html+=`
<hr style="border:1px solid gold;">
🌌 ${energia}
`;

document.getElementById("resultado").innerHTML=html;

seleccionadas=[];
}

/* 🌙 HORÓSCOPO ORIGINAL RESTAURADO */
const signos=[
"Aries","Tauro","Géminis","Cáncer",
"Leo","Virgo","Libra","Escorpio",
"Sagitario","Capricornio","Acuario","Piscis"
];

const mensajes=[
{
amor:"tensión emocional leve",
dinero:"pequeña oportunidad inesperada",
energia:"alta pero dispersa",
consejo:"evita impulsos"
},
{
amor:"conexión estable",
dinero:"día neutro",
energia:"equilibrada",
consejo:"confía en el proceso"
},
{
amor:"acercamiento emocional",
dinero:"mejora progresiva",
energia:"crecimiento interno",
consejo:"escucha tu intuición"
},
{
amor:"confusión emocional",
dinero:"bloqueo temporal",
energia:"inestable",
consejo:"no fuerces nada"
},
{
amor:"energía positiva",
dinero:"avance laboral",
energia:"muy alta",
consejo:"actúa con confianza"
}
];

const hoy=new Date();
const seed=hoy.getFullYear()*1000 + hoy.getMonth()*100 + hoy.getDate();

function rand(n){
let x=Math.sin(n)*10000;
return x-Math.floor(x);
}

document.getElementById("horo").innerHTML=
signos.map((s,i)=>{
let m=mensajes[Math.floor(rand(seed+i)*mensajes.length)];
return `<div><b style="color:gold;">${s}</b><br>
💖 ${m.amor}<br>
💰 ${m.dinero}<br>
⚡ ${m.energia}<br>
✨ ${m.consejo}</div>`;
}).join("");

</script>

</body>
</html>
